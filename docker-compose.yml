services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: dev_dashdb
      POSTGRES_USER: web
      POSTGRES_PASSWORD: webpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
