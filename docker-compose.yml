services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: dev_dashdb
      POSTGRES_USER: web
      POSTGRES_PASSWORD: webpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://web:webpass@db:5432/dev_dashdb?sslmode=disable
      DATABASE_MAX_CONNS: "10"
      DATABASE_MAX_CONN_IDLE_TIME: "20s"
      DATABASE_MIN_CONNS: "2"
      SEED: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
